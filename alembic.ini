##  config file for the alembic CLI tool
# what is read when 'alembic upgrade head' is run in terminal
# db url is not hardcoded here: this project reads syncamically from settings in env.py


[alembic]
# where migration scripts live
script_location = alembic
# names migration files by date+time+slug (e.g. 20250311_1430_add_user_table.py)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
# adds the project root to sys.path so alembic can import app.*
prepend_sys_path = .
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
